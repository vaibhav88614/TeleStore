name: "Release (signed)"

# Signed cross-platform release scaffold (Track C).
#
# This is a TEMPLATE. It will not produce trusted installers until you add the
# secrets referenced below. See docs/SIGNING.md for how to obtain each one.
# Until then, keep using the unsigned release.yml for personal builds.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY            minisign private key (npx @tauri-apps/cli signer generate)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   password for the above
#   WINDOWS_CERTIFICATE                  base64 .pfx Authenticode cert
#   WINDOWS_CERTIFICATE_PASSWORD         password for the .pfx
#   APPLE_CERTIFICATE                    base64 Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD           password for the .p12
#   APPLE_SIGNING_IDENTITY               e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                             Apple ID email for notarization
#   APPLE_PASSWORD                       app-specific password
#   APPLE_TEAM_ID                        Apple Developer team id
#   ANDROID_KEYSTORE_BASE64              base64 release .keystore
#   ANDROID_KEYSTORE_PASSWORD            keystore password
#   ANDROID_KEY_ALIAS                    key alias
#   ANDROID_KEY_PASSWORD                 key password

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-signed"

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libfuse2

      - name: Install frontend deps
        working-directory: app
        run: npm ci || npm install

      # ── macOS: import Developer ID cert into a temporary keychain ──
      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then echo "::warning::APPLE_CERTIFICATE not set — skipping (build will be UNSIGNED)"; exit 0; fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm cert.p12

      - name: Build & sign (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (optional — only if you re-enable the updater):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code-signing (Tauri reads these for Authenticode):
          TAURI_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          TAURI_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: ./app
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "TeleStore ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        working-directory: app
        run: npm ci || npm install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — Android build will be skipped/unsigned"; exit 0; fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      # Tauri v2 Android build + jarsigner/apksigner signing. The exact init step
      # depends on your local `src-android` project (gitignored). See docs/SIGNING.md.
      - name: Build signed APK (template)
        if: env.ANDROID_KEYSTORE_PATH != ''
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: app
        run: |
          echo "TODO: npx tauri android init (once) + npx tauri android build --apk"
          echo "Then sign with apksigner using \$ANDROID_KEYSTORE_PATH."
